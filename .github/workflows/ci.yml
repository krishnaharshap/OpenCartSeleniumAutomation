name: OpenCart Selenium Regression

# Scoped to main only: PRs targeting main and pushes that land on main (merges), plus a manual
# escape hatch. This repo is public, so ubuntu-latest minutes are free regardless of trigger
# volume -- the scoping is about keeping the Actions tab readable, not about cost.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run regression suite (headless Chrome)
        run: mvn -B test -Dheadless=true

      - name: Upload ChainTest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaintest-report
          path: target/chaintest/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 30
